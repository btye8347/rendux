<div class="widget-status-grid">
  {% if title %}<h2 class="widget-title">{{ title }}</h2>{% endif %}
  {% if items %}
  <div class="status-grid-items">
    {% for item in items %}
    <div class="status-grid-item status-{{ item.status | default('unknown') }}">
      <span class="status-dot"></span>
      <span class="status-item-label">{{ item.label }}</span>
      {% if item.detail %}<span class="status-item-detail">{{ item.detail }}</span>{% endif %}
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="empty-state">No items.</p>
  {% endif %}
</div>
