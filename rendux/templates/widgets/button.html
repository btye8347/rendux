{% if href %}
<a href="{{ href }}"
   class="btn btn-{{ variant|default('primary') }} btn-{{ size|default('md') }}{% if disabled %} btn-disabled{% endif %}"
   {% if disabled %}aria-disabled="true"{% endif %}>
  {% if icon %}<span class="btn-icon">{{ icon }}</span>{% endif %}
  {{- label -}}
</a>
{% else %}
<button type="{{ type|default('button') }}"
        class="btn btn-{{ variant|default('primary') }} btn-{{ size|default('md') }}"
        {% if disabled %}disabled{% endif %}>
  {% if icon %}<span class="btn-icon">{{ icon }}</span>{% endif %}
  {{- label -}}
</button>
{% endif %}
